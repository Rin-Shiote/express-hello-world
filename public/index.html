<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
        }

        .chat {
            display: flex;
            flex-direction: column;
            height: 80vh;
            width: 300px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .form {
            display: flex;
        }

        .input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .submit {
            padding: 10px;
            border: 1px solid #ccc;
            background: #eee;
            cursor: pointer;
        }

        /* ★ 色パレット */
        .palette {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #333;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="chat">
            <ul class="messages"></ul>

            <form class="form">
                <input class="input" autocomplete="off" />
                <button class="submit">Send</button>
            </form>
        </div>

        <!-- ★ キャンバス横の色パレット -->
        <div class="palette">
            <div class="color-btn" style="background:#000000" data-color="#000000"></div>
            <div class="color-btn" style="background:#ff0000" data-color="#ff0000"></div>
            <div class="color-btn" style="background:#00aa00" data-color="#00aa00"></div>
            <div class="color-btn" style="background:#0000ff" data-color="#0000ff"></div>
            <div class="color-btn" style="background:#ffaa00" data-color="#ffaa00"></div>
            <div class="color-btn" style="background:#ff00ff" data-color="#ff00ff"></div>
        </div>

        <canvas id="canvas" width="600" height="600" style="border: solid 1px black"></canvas>

    </div>

    <script>
        function main() {
            const host = location.origin.replace(/^http/, 'ws')
            const ws = new WebSocket(host + '/ws')

            let username = prompt("ユーザー名を入力してください（空欄なら名無し）")
            if (!username) username = "名無し"

            const myId = self.crypto.randomUUID().substr(0, 8)

            const canvas = document.getElementById('canvas')
            const ctx = canvas.getContext('2d')

            let drawing = false
            let currentColor = "#000000"

            // ★ パレットの色ボタンにイベント追加
            document.querySelectorAll(".color-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentColor = btn.dataset.color
                })
            })

            canvas.addEventListener('mousedown', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mousedown')
            })
            function mousedown(color) {
                drawing = true
                ctx.beginPath()
                ctx.strokeStyle = color
            }

            canvas.addEventListener('mousemove', (e) => {
                if (drawing) {
                    sendDrawingEvent(e.offsetX, e.offsetY, 'mousemove')
                }
            })
            function mousemove(x, y, color) {
                if (drawing) {
                    ctx.strokeStyle = color
                    draw(x, y, true)
                }
            }

            canvas.addEventListener('mouseup', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mouseup')
            })
            function mouseup() {
                drawing = false
                ctx.beginPath()
            }

            canvas.addEventListener('mouseout', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mouseout')
            })
            function mouseout() {
                drawing = false
            }

            function draw(x, y, dragging) {
                if (dragging) {
                    ctx.lineTo(x, y)
                    ctx.stroke()
                } else {
                    ctx.moveTo(x, y)
                }
            }

            function sendDrawingEvent(x, y, control) {
                ws.send(JSON.stringify({
                    x,
                    y,
                    control,
                    color: currentColor,
                    type: 'paint'
                }))
            }

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data)

                if (msg.type === 'paint') {
                    const { x, y, control, color } = msg
                    if (control === 'mousedown') mousedown(color)
                    else if (control === 'mouseup') mouseup()
                    else if (control === 'mousemove') mousemove(x, y, color)
                    else if (control === 'mouseout') mouseout()
                }

                if (msg.type === 'chat') {
                    const { id, text, username: name } = msg
                    const messageList = document.querySelector('.messages')
                    const li = document.createElement('li')

                    const displayName = name || "名無し"

                    if (id === myId) {
                        li.textContent = `(${displayName}) 自分: ` + text
                    } else {
                        li.textContent = `${displayName}: ${text}`
                    }
                    messageList.appendChild(li)
                }
            }

            const form = document.querySelector('.form')
            form.onsubmit = function (e) {
                e.preventDefault()
                const input = document.querySelector('.input')
                const text = input.value

                ws.send(JSON.stringify({
                    id: myId,
                    username,
                    text,
                    type: 'chat'
                }))

                input.value = ''
                input.focus()
            }
        }

        main()
    </script>
</body>

</html>
